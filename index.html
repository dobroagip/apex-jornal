    <script>
      (function() {
        try {
          var _fetch = window.fetch;
          if (_fetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return _fetch; },
              set: function(v) {
                console.warn('Blocked attempt to overwrite window.fetch');
              },
              configurable: true
            });
          }
        } catch (e) {}
      })();
    </script>
